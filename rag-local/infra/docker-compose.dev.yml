services:
  ui:
    environment:
      - XDG_CACHE_HOME=/tmp
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:18501:8501"
    restart: unless-stopped

  ingestor:
    environment:
      - XDG_CACHE_HOME=/tmp
    tmpfs:
      - /tmp
      - /var/tmp
    ports:
      - "127.0.0.1:18001:8001"
    restart: unless-stopped

  web:
    ports:
      - "127.0.0.1:18080:80"
      # uncomment if/when you terminate TLS in-container
      # - "127.0.0.1:18443:443"
