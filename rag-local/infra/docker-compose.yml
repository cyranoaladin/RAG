networks:
  rag_net:
    driver: bridge

volumes:
  rag_chroma_data:
  rag_ollama_data:
  rag_mm_cache:

services:
  chroma:
    image: chromadb/chroma:1.1.1
    restart: unless-stopped
    networks: [rag_net]
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - rag_chroma_data:/chroma/chroma
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD","bash","-ec","set -o pipefail; exec 3<>/dev/tcp/127.0.0.1/8000; printf \"GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; timeout 5 head -n 1 <&3 | grep -q \"200\""]
      start_period: 20s
      interval: 20s
      timeout: 5s
      retries: 10
    profiles: ["db"]

  ollama:
    image: ollama/ollama:0.3.13
    restart: unless-stopped
    networks: [rag_net]
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - rag_ollama_data:/root/.ollama
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD","bash","-ec","set -o pipefail; exec 3<>/dev/tcp/127.0.0.1/11434; printf \"GET /api/tags HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; timeout 5 head -n 1 <&3 | grep -q \"200\""]
      start_period: 20s
      interval: 20s
      timeout: 5s
      retries: 10
    profiles: ["llm"]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 24G

  ingestor:
    build: ../src/ingestor
    restart: unless-stopped
    networks: [rag_net]
    environment:
      TZ: ${TZ:-UTC}
      CHROMA_HOST: chroma
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      OLLAMA_URL: "http://ollama:${OLLAMA_PORT:-11434}"
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      SMALL_LLM: ${SMALL_LLM:-llama3.2:latest}
      GOOGLE_APPLICATION_CREDENTIALS: /creds/gdrive-sa.json
      LOCAL_SOURCE_ROOT: /data/uploads
      INGESTOR_API_TOKEN: ${INGESTOR_API_TOKEN}
      INGESTOR_IP_ALLOWLIST: ${INGESTOR_IP_ALLOWLIST:-}
      USER_AGENT: ${USER_AGENT:-rag-local-ingestor/1.0}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-15}
      XDG_CACHE_HOME: /tmp
      MAX_REMOTE_BYTES: ${MAX_REMOTE_BYTES:-26214400}
      MULTIMODAL_ENABLED: ${MULTIMODAL_ENABLED:-false}
      MM_PARSER_TIMEOUT: ${MM_PARSER_TIMEOUT:-30}
      MM_MAX_CHARS_PER_CHUNK: ${MM_MAX_CHARS_PER_CHUNK:-1200}
      MM_CACHE_DIR: ${MM_CACHE_DIR:-/data/mm-cache}
      CHROMA_REQUEST_TIMEOUT: ${CHROMA_REQUEST_TIMEOUT:-30}
      OLLAMA_REQUEST_TIMEOUT: ${OLLAMA_REQUEST_TIMEOUT:-60}
    volumes:
      - ./creds:/creds:ro
      - ./data/uploads:/data/uploads:rw
      - rag_mm_cache:/data/mm-cache
    command: uvicorn api:app --host 0.0.0.0 --port ${INGESTOR_PORT:-8001}
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs: ["/tmp", "/var/tmp"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import sys
          import urllib.request

          try:
              urllib.request.urlopen("http://localhost:${INGESTOR_PORT:-8001}/health", timeout=5)
          except Exception:
              sys.exit(1)
          PY
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    profiles: ["api"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 8G


  ui:
    build: ../src/ui
    restart: unless-stopped
    networks: [rag_net]
    environment:
      - TZ=${TZ}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=${CHROMA_PORT}
      - XDG_CACHE_HOME=/tmp
      - STREAMLIT_SERVER_HEADLESS=true
      - INGEST_BASE_URL=${INGEST_BASE_URL}
      - INGEST_API_TOKEN=${INGEST_API_TOKEN}
      - UI_WEBHOOK_TIMEOUT=${UI_WEBHOOK_TIMEOUT:-10}
      - CHROMA_REQUEST_TIMEOUT=${CHROMA_REQUEST_TIMEOUT:-30}
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp
      - /root/.streamlit
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD","bash","-ec","set -o pipefail; exec 3<>/dev/tcp/127.0.0.1/${STREAMLIT_PORT}; printf \"GET / HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; timeout 5 head -n 1 <&3 | grep -q \"200\""]
      start_period: 25s
      interval: 15s
      timeout: 5s
      retries: 12
    depends_on:
      chroma:
        condition: service_healthy
      ingestor:
        condition: service_healthy
    profiles: ["ui"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

