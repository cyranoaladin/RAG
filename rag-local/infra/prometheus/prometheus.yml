global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # Configure alertmanager when available:
      # - targets:
      #   - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: ingestor
    metrics_path: /metrics
    static_configs:
      - targets: ["ingestor:8001"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: ingestor

  - job_name: chroma
    static_configs:
      - targets: ["chroma:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: chroma

  - job_name: ollama
    static_configs:
      - targets: ["ollama:11434"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: ollama

  - job_name: ui
    static_configs:
      - targets: ["ui:8501"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: ui

  # v2 services (uncomment when using pgvector architecture)
