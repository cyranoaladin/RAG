[pytest]
# Root pytest configuration.
# Real test suites live in each service's venv. Running pytest from
# the root without a service venv would produce collection errors.
# This config restricts root collection to avoid service directories.
norecursedirs =
    services
    packages
    corpus
    docs
    .git
    __pycache__
    node_modules
    .venv

addopts = -q
