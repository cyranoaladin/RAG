# RAG Service v2 — Nginx config
# Remplace l'ancienne config rag-api.conf.template

upstream rag_api {
    server ingestor:8001;
    keepalive 32;
}

upstream rag_ui {
    server ui:8501;
    keepalive 8;
}

limit_req_zone $binary_remote_addr zone=api_search:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_ingest:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_admin:10m rate=10r/s;

server {
    listen 443 ssl http2;
    server_name ${RAG_API_DOMAIN};

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Search endpoint — rate limited
    location /search {
        limit_req zone=api_search burst=60 nodelay;
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Ingest endpoint — rate limited (plus restrictif)
    location /ingest {
        limit_req zone=api_ingest burst=10 nodelay;
        client_max_body_size 100M;
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Admin — IP allowlist
    location /admin {
        limit_req zone=api_admin burst=20;
        allow 127.0.0.1;
        allow 88.99.254.59;  # VPS mf
        deny all;
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Metrics — localhost only
    location /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://rag_api;
    }

    # Health — public
    location /health {
        proxy_pass http://rag_api;
    }

    # Stats — authenticated
    location /stats {
        limit_req zone=api_search burst=20 nodelay;
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Eval — authenticated, admin only
    location /eval {
        limit_req zone=api_admin burst=5;
        allow 127.0.0.1;
        allow 88.99.254.59;
        deny all;
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # KB endpoints (compatibilité v1)
    location /kb {
        limit_req zone=api_search burst=60 nodelay;
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # RAG query (compatibilité v1)
    location /rag {
        limit_req zone=api_search burst=60 nodelay;
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Tout le reste
    location / {
        limit_req zone=api_search burst=60 nodelay;
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}

server {
    listen 443 ssl http2;
    server_name ${RAG_UI_DOMAIN};

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://rag_ui;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
