#
# Ce workflow appelle le script infra/scripts/smoke.sh qui :
# - Attend jusqu'à 2 minutes que tous les services soient healthy (60 tentatives)
# - Affiche automatiquement tous les logs, l'état réseau, docker ps, inspect, etc. en cas d'échec
# - Permet un diagnostic immédiat en cas de problème CI
# Voir CI_ROBUSTESSE.md pour plus de détails.

name: CI Smoke (Compose)

'on':
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install helper deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          else
            python -m pip install pytest
          fi
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Docker info
        run: |
          docker --version
          docker compose version
          docker info

      - name: Ensure CI env file
        run: |
          if [ ! -f infra/.env.ci ]; then
            mkdir -p infra
            printf '%s\n' 'INGESTOR_API_TOKEN=devtoken' > infra/.env.ci
            printf '%s\n' 'INGEST_BASE_URL=http://ingestor:8001' >> infra/.env.ci
            printf '%s\n' 'METRICS_ENABLED=true' >> infra/.env.ci
            printf '%s\n' 'METRICS_NAMESPACE=rag' >> infra/.env.ci
            printf '%s\n' 'MULTIMODAL_ENABLED=false' >> infra/.env.ci
          fi
          sed -n '1,120p' infra/.env.ci || true

      - name: Compose up (db,llm,api) with smoke override
        run: |
          COMPOSE_PROFILES=db,llm,api docker compose \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.smoke.override.yml \
            --env-file infra/.env.ci \
            up -d --build

      - name: Wait for ingestor health (container-internal)
        run: |
          for i in $(seq 1 60); do
            code=$(docker compose -f infra/docker-compose.yml -f infra/docker-compose.smoke.override.yml --env-file infra/.env.ci exec -T ingestor curl -sS -o /dev/null -w "%{http_code}" http://localhost:8001/health || true)
            if [ "${code}" = "200" ]; then echo "health OK"; break; fi
            sleep 2
            if [ "$i" = "60" ]; then echo "health timeout"; exit 1; fi
          done

      - name: Run smoke script if present else do minimal curls
        run: |
          if [ -x infra/scripts/smoke.sh ]; then
            bash infra/scripts/smoke.sh
          else
            echo "GET /health"
            curl -fsS http://127.0.0.1:18001/health
            echo
            echo "POST /ingest (text mode fallback)"
            curl -fsS -H "X-API-Token: devtoken" \
              -F "file=@README.md;type=text/markdown" \
              "http://127.0.0.1:18001/ingest?mode=text"
            echo
          fi

      - name: Teardown
        if: always()
        run: |
          COMPOSE_PROFILES=db,llm,api docker compose \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.smoke.override.yml \
            --env-file infra/.env.ci \
            down --remove-orphans -v
