# GitHub CodeQL Security Scanning Configuration
# Author: Alaeddine BEN RHOUMA
# Date: March 2026
#
# This workflow runs CodeQL analysis on the rag-local codebase
# to detect security vulnerabilities and coding errors.

name: "CodeQL Security Scan"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run every Monday at 03:00 UTC
    - cron: "0 3 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
        # CodeQL supports: 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby', 'swift'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Specify queries to run
          queries: security-extended,security-and-quality
          # If you want to include custom queries, uncomment:
          # packs: ./codeql-custom-queries

      # Autobuild attempts to build any compiled languages (C/C++, C#, Go, Java, Swift).
      # For Python, this step is typically not required.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
          # Upload SARIF file to GitHub Security tab
          upload: true
          # Path to SARIF file (relative to workspace root)
          # output: sarif/output.sarif

      # Optional: Upload SARIF to external security dashboard
      # - name: Upload SARIF to external dashboard
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: codeql-sarif
      #     path: sarif/output.sarif
