[pytest]
filterwarnings =
    # Starlette: Pending deprecation autour de python_multipart (amont)
    ignore:Please use `import python_multipart` instead.*:PendingDeprecationWarning
    # Pydantic v2: alias fourni au mauvais niveau (refactor prévu)
    ignore::UserWarning:pydantic

addopts = -q
markers =
    integration: tests requiring external services (db, etc.)
    asyncio: async test cases
    legacy_engine: tests for the historical Chroma/Ollama engine (api.py), to be decommissioned (ADR-0013)
