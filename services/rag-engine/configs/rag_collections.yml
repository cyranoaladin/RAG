version: 2
# ADR-0013 — Convention: rag_nexus_{matiere}_{niveau}_{statut}
# Extension FE-06: rag_nexus_{matiere}_{niveau}_{voie}_{statut} quand voie pertinente
# Exceptions nommées: grand_oral, exams, candidats_libres, quarantine, dnb (cf. ADR)
# Flag instanciee: seules les collections true sont créées et exposées (M-04)
# Pas d'auto-création: le moteur lève une erreur si la collection n'est pas déclarée instanciee
#
# Périmètre v1 (D-PERIMETRE-EXPLICITE):
#   Voie générale + STMG + collège 3e.
#   Autres séries technologiques (ST2S, STI2D, STL, STD2A, STHR, S2TMD) = hors scope v1.
#   Convention voie extensible: ajouter un slug voie (st2s, sti2d...) sans refonte.
#
# Session (D-SESSION-DECLAREE-JAMAIS-DEVINEE):
#   session_policy: declared_or_null — la session est déclarée depuis la source
#   ou laissée NULL + needs_review. Jamais devinée par un agent.

physical_backend:
  type: pgvector
  table: rag_chunks
  dsn_env: PG_RAG_DSN
  vector_dim: 1024


metadata_required:
  - domain
  - audience
  - niveau
  - voie
  - matiere
  - statut_enseignement
  - type_doc
  - source_kind
  - rights
  - review_status
  - source_label
  - source_uri
  - doc_id
  - chunk_id
  - chunk_sha256

