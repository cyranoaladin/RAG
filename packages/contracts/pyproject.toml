[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nexus-contracts"
version = "0.1.0"
description = "Shared retrieval contract for the Nexus RAG platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[tool.setuptools.packages.find]
where = ["src"]
