name: CI — Nexus RAG Platform

on:
  push:
    branches: [main, "lot-*/**"]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: "packages/contracts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e packages/contracts
      - run: python -c "from nexus_contracts import RetrievalRequest, StudentProfile; print('OK')"

  rag-pedago:
    name: "services/rag-pedago"
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e packages/contracts
      - working-directory: services/rag-pedago
        run: pip install -e ".[dev]"
      - working-directory: services/rag-pedago
        run: make lint
      - working-directory: services/rag-pedago
        run: make typecheck
      - working-directory: services/rag-pedago
        run: make test

  rag-engine:
    name: "services/rag-engine"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - working-directory: services/rag-engine
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements-dev.txt 2>/dev/null || pip install ruff mypy pytest
      - working-directory: services/rag-engine
        run: make lint
      - working-directory: services/rag-engine
        run: make typecheck
      - working-directory: services/rag-engine
        run: make test

  governance-locks:
    name: "governance locks guard"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - run: bash scripts/check-governance-locks.sh
